name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          if [ -z "${VPS_IP:-}" ]; then echo "::error::Secret VPS_IP vide — ajoutez-le dans le dépôt (Settings → Secrets)."; exit 1; fi
          echo "${{ secrets.VPS_SSH_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          if [ ! -s "$HOME/.ssh/id_rsa" ]; then echo "::error::Secret VPS_SSH_KEY vide — collez la clé privée complète."; exit 1; fi
          printf '%s\n' 'Host *' '  StrictHostKeyChecking accept-new' >> "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"

      - name: Sync .env from ENV_PRODUCTION secret
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          printf '%s\n' "$ENV_PRODUCTION" | ssh $VPS_USER@$VPS_IP 'cat > /var/www/api.la-peche-evenements/.env'

      - name: Deploy to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_IP << ENDSSH
            set -e
            cd /var/www/api.la-peche-evenements
            git fetch origin main
            git reset --hard origin/main
            pnpm install
            pnpm build
            if docker compose version >/dev/null 2>&1; then
              docker compose restart
            else
              docker-compose restart
            fi
            echo "✅ Backend déployé"
          ENDSSH

      - name: Verify
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ssh $VPS_USER@$VPS_IP 'docker ps --filter name=la-peche-evenements-strapi --format "{{.Names}} - {{.Status}}"'
